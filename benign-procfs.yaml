playbook:
  id: campaign-benign-procfs
  name: Benign - Procfs and file polling
  scenario_type: test
  version: "1.0"

actors:
  worker:
    node: alpine1

steps:
  - id: procfs-cmdline-poll
    stage: benign
    actor: worker
    description: Frequent /proc cmdline and status polling
    executor:
      type: direct
      command: "for i in $(seq 1 80); do cat /proc/self/cmdline >/dev/null; cat /proc/self/status >/dev/null; cat /proc/1/cmdline >/dev/null 2>&1; done"
    timeout: 25

  - id: procfs-runtime-poll
    stage: benign
    actor: worker
    description: Runtime stats polling similar to service watchdogs
    executor:
      type: direct
      command: "for i in $(seq 1 80); do cat /proc/stat /proc/meminfo /proc/uptime >/dev/null; done"
    timeout: 25

  - id: file-stat-poll
    stage: benign
    actor: worker
    description: Repeated stat and read on a hot file path
    executor:
      type: direct
      command: "mkdir -p /tmp/hw17 && date > /tmp/hw17/data && for i in $(seq 1 100); do ls -l /tmp/hw17/data >/dev/null; cat /tmp/hw17/data >/dev/null; done"
    timeout: 25
